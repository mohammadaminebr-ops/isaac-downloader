name: Isaac Sim To Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Login to NVIDIA NGC
        uses: docker/login-action@v3
        with:
          registry: nvcr.io
          username: $oauthtoken
          password: ${{ secrets.NGC_API_KEY }}

      - name: Pull Isaac Sim
        run: docker pull nvcr.io/nvidia/isaac-sim:4.0.0

      - name: Save Docker Image
        run: docker save nvcr.io/nvidia/isaac-sim:4.0.0 -o isaac-sim.tar

      - name: Split and Remove Original
        run: |
          split -b 1800M -d isaac-sim.tar "isaac-sim-part-"
          rm isaac-sim.tar
          echo "Files created successfully:"
          ls -lh

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.0.0-final
          name: Isaac Sim v4.0.0 Final Parts
          files: isaac-sim-part-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
